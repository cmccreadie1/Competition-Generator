<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZONEDRAW v8.9.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc;
            --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.3);
            --border: rgba(148, 163, 184, 0.2);
            --red-g: linear-gradient(135deg, #ef4444, #991b1b);
            --yellow-g: linear-gradient(135deg, #f59e0b, #92400e);
            --green-g: linear-gradient(135deg, #10b981, #065f46);
            --blue-g: linear-gradient(135deg, #3b82f6, #1e40af);
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; text-transform: uppercase; line-height: 1.2; overflow-x: hidden; }
        input, select { text-transform: uppercase; font-weight: 900 !important; color: white; background: rgba(255,255,255,0.05); border: 2px solid var(--border); border-radius: 12px; padding: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); background: rgba(255,255,255,0.1); }

        /* Navigation Header */
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 5000; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .brand-name { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: var(--accent); }
        .nav-back-btn { display: none; background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 900; font-size: 10px; cursor: pointer; }

        /* Dynamic Zone Modules */
        .zone-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; transform: translateY(30px); }
        .zone-card.visible { opacity: 1; transform: translateY(0); }
        .zone-header { font-size: 12px; font-weight: 900; color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Results Elements */
        .res-row { display: grid; grid-template-columns: 1fr 120px 120px; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .angler-name { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
        .draw-pill { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; color: white; text-align: center; }
        .peg-num { font-size: 24px; font-weight: 900; margin-left: 10px; vertical-align: middle; }

        /* Command Center Footer */
        .command-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 5000; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px); border-top: 2px solid var(--accent); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }

        /* Layout Sections */
        #entrySection, #resultsSection, #checkSheetSection { max-width: 1400px; margin: 0 auto; padding: 100px 20px 120px; }

        .control-panel { background: var(--card); border-radius: 24px; padding: 40px; border: 1px solid var(--border); text-align: center; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; margin-top: 30px; }

        /* Toggle Switches */
        .mode-switch { display: flex; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 5px; gap: 5px; width: fit-content; margin: 0 auto; }
        .mode-opt { padding: 10px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .mode-opt.active { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* Check Sheet Style */
        .check-sheet-table { width: 100%; border-collapse: collapse; }
        .check-sheet-table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 800; }
        .cb-custom { width: 30px; height: 30px; border: 2px solid var(--accent); border-radius: 6px; cursor: pointer; display: inline-block; position: relative; }
        .cb-custom.active { background: var(--accent); }
        .cb-custom.active::after { content: '✓'; position: absolute; left: 6px; top: 0px; color: white; font-size: 20px; }

        .btn-action { background: var(--accent); border: none; color: white; font-weight: 900; padding: 18px 40px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow); }
        
        @media print { .no-print { display: none !important; } #resultsSection, #checkSheetSection { padding: 0; color: black; background: white; } }
    </style>
</head>
<body>

<div class="fixed-header no-print">
    <div class="header-content">
        <button id="navBack" class="nav-back-btn" onclick="globalBack()">← BACK</button>
        <div class="brand-name">ZONEDRAW <span style="font-size:10px; opacity:0.5;">v8.9.0</span></div>
        <button onclick="toggleHistory()" style="background:transparent; border:1px solid var(--accent); color:var(--accent); font-weight:900; padding:6px 15px; border-radius:8px; font-size:10px; cursor:pointer;">VAULT</button>
    </div>
</div>

<div id="entrySection" class="no-print">
    <div class="control-panel">
        <label style="font-size: 12px; opacity: 0.6;">TOURNAMENT IDENTITY</label>
        <input type="text" id="matchTitle" style="width:100%; font-size:24px; text-align:center; margin-top:10px;" placeholder="ENTER MATCH NAME...">
        
        <div class="config-grid">
            <div>
                <label>MATCH DURATION</label>
                <div class="mode-switch">
                    <div id="dayOpt1" class="mode-opt" onclick="setDays(1)">1 DAY</div>
                    <div id="dayOpt2" class="mode-opt active" onclick="setDays(2)">2 DAYS</div>
                </div>
            </div>
            <div><label>TEAMS</label><input type="number" id="initTeams" value="0" style="width:80px;"></div>
            <div><label>INDIVIDUALS</label><input type="number" id="initIndivs" value="0" style="width:80px;"></div>
            <div><label>PRIZE ENTRY (£)</label><input type="number" id="prizeFee" value="10" style="width:80px;"></div>
            <div><label>PAIRS ENTRY (£)</label><input type="number" id="pairsFee" value="5" style="width:80px;"></div>
        </div>
        <button class="btn-action" style="margin-top:40px;" onclick="bulkInit()">INITIALIZE DASHBOARD</button>
    </div>
    <div id="entryList" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(350px, 1fr)); gap:20px; margin-top:40px;"></div>
</div>

<div id="resultsSection" style="display:none;">
    <div class="no-print" style="display:flex; gap:10px; justify-content:center; margin-bottom:30px;">
        <button onclick="window.print()" class="btn-action" style="padding:12px 20px; font-size:10px;">PRINT PDF</button>
        <button onclick="showCheckSheet()" class="btn-action" style="padding:12px 20px; font-size:10px; background:#4f46e5;">STEWARD MODE</button>
        <button onclick="exportToCSV()" class="btn-action" style="padding:12px 20px; font-size:10px; background:#10b981;">SAVE CSV</button>
        <button onclick="handleAmend()" class="btn-action" style="padding:12px 20px; font-size:10px; background:#f59e0b;">AMEND DATA</button>
    </div>
    <div id="captureArea">
        <h1 id="resTitle" style="text-align:center; font-size:3rem; margin-bottom:40px; letter-spacing:2px;"></h1>
        <div id="resultsArea" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(500px, 1fr)); gap:25px;"></div>
    </div>
</div>

<div id="checkSheetSection" style="display:none;">
    <div id="checkSheetArea"></div>
</div>

<div id="commandBar" class="command-bar no-print" style="display:none;">
    <div style="display:flex; gap:40px;">
        <div style="display:flex; flex-direction:column;"><span style="font-size:10px; color:var(--accent);">ANGLERS</span><span id="tkAnglers" style="font-size:22px; font-weight:900;">0</span></div>
        <div id="cashModule" style="display:none; flex-direction:column;"><span style="font-size:10px; color:#10b981;">TOTAL CASH</span><span id="tkCash" style="font-size:22px; font-weight:900; color:#10b981;">£0</span></div>
    </div>
    <div id="actionBtnArea">
        <button class="btn-action" id="mainActionBtn" onclick="initiateShuffle()">PROCESS RANDOM DRAW</button>
    </div>
</div>

<div id="shuffleOverlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.98); z-index:9000; display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h2 id="shuffleText" style="font-size:3rem; font-weight:900; letter-spacing:5px;">RANDOMIZING</h2>
    <div style="width:400px; height:6px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; margin-top:20px;"><div id="pBar" style="height:100%; width:0%; background:var(--accent); transition:0.1s;"></div></div>
</div>

<script>
    const zones = ['RED', 'YELLOW', 'GREEN', 'BLUE'];
    const zoneGradients = { 'RED': 'var(--red-g)', 'YELLOW': 'var(--yellow-g)', 'GREEN': 'var(--green-g)', 'BLUE': 'var(--blue-g)' };
    const rotationMap = { 'RED': 'BLUE', 'BLUE': 'RED', 'YELLOW': 'GREEN', 'GREEN': 'YELLOW' };
    let currentDrawData = [];
    let frozenData = [];
    let matchDays = 2;

    function setDays(d) {
        matchDays = d;
        document.getElementById('dayOpt1').classList.toggle('active', d === 1);
        document.getElementById('dayOpt2').classList.toggle('active', d === 2);
    }

    function globalBack() {
        if(document.getElementById('checkSheetSection').style.display === 'block') showResults();
        else if(document.getElementById('resultsSection').style.display === 'block') handleAmend();
    }

    function bulkInit() {
        const t = parseInt(document.getElementById('initTeams').value) || 0;
        const i = parseInt(document.getElementById('initIndivs').value) || 0;
        for(let x=0; x<t; x++) addNewItem('TEAM');
        for(let y=0; y<i; y++) addNewItem('INDIV');
        document.getElementById('commandBar').style.display = 'flex';
        updateTicker();
    }

    function addNewItem(type, data = null) {
        const list = document.getElementById('entryList');
        const div = document.createElement('div');
        div.className = 'zone-card visible' + (data ? ' frozen' : '');
        div.dataset.type = type;
        
        let html = data ? `<span style="font-size:9px; background:var(--accent); padding:2px 8px; border-radius:4px; position:absolute; top:-10px;">LOCKED</span>` : `<button onclick="this.parentElement.remove(); updateTicker();" style="position:absolute; top:10px; right:10px; background:none; border:none; color:var(--red-g); cursor:pointer; font-weight:900;">×</button>`;
        
        if(type === 'TEAM') {
            html += `<label>TEAM IDENTITY</label><input type="text" class="t-name" value="${data ? data.tName : ''}" style="width:90%; margin-bottom:15px;">` + 
                    [0,1,2,3].map(n => `<input type="text" class="a-name" value="${data ? data.anglers[n].name : ''}" placeholder="ANGLER ${n+1}" style="width:90%; margin-bottom:8px;">`).join('');
        } else {
            const name = data ? (data.anglers ? data.anglers[0].name : data.name) : '';
            html += `<label>SOLO ANGLER</label><input type="text" class="a-name" value="${name}" style="width:90%;">`;
        }
        div.innerHTML = html;
        list.appendChild(div);
    }

    function updateTicker() {
        let count = 0;
        document.querySelectorAll('.a-name').forEach(i => { if(i.value.trim()) count++; });
        document.getElementById('tkAnglers').innerText = count;
    }

    function initiateShuffle() {
        const overlay = document.getElementById('shuffleOverlay');
        const pBar = document.getElementById('pBar');
        overlay.style.display = 'flex';
        let p = 0;
        const inv = setInterval(() => {
            p += 4; pBar.style.width = p + '%';
            if(p >= 100) { clearInterval(inv); overlay.style.display = 'none'; runDraw(); }
        }, 40);
    }

    function runDraw() {
        let newTeams = [], newIndivs = [];
        document.querySelectorAll('.zone-card:not(.frozen)').forEach(block => {
            const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim().toUpperCase()).filter(n => n);
            const tName = (block.querySelector('.t-name')?.value || "").trim().toUpperCase();
            if(block.dataset.type === 'TEAM' && names.length) newTeams.push({ tName, anglers: names });
            else if(names[0]) newIndivs.push({ name: names[0] });
        });

        let occ1 = { RED:[], YELLOW:[], GREEN:[], BLUE:[] };
        let occ2 = { RED:[], YELLOW:[], GREEN:[], BLUE:[] };
        frozenData.forEach(g => g.anglers.forEach(a => { occ1[a.z1].push(a.p1); if(matchDays==2) occ2[a.z2].push(a.p2); }));

        const total = (frozenData.reduce((acc,g) => acc+g.anglers.length,0)) + (newTeams.length*4) + newIndivs.length;
        const base = Math.floor(total/4), rem = total%4;

        let pools1 = zones.map((z, i) => {
            let s = base + (i < rem ? 1 : 0);
            let p = []; for(let n=1; n<=s; n++) if(!occ1[z].includes(n)) p.push(n);
            for (let j = p.length - 1; j > 0; j--) { const k = Math.floor(Math.random()*(j+1)); [p[j], p[k]]=[p[k], p[j]]; }
            return { z, p };
        });

        let pools2 = zones.map((z) => {
            const src = Object.keys(rotationMap).find(k => rotationMap[k] === z);
            const srcIdx = zones.indexOf(src);
            let s = base + (srcIdx < rem ? 1 : 0);
            let p = []; for(let n=1; n<=s; n++) if(!occ2[z].includes(n)) p.push(n);
            for (let j = p.length - 1; j > 0; j--) { const k = Math.floor(Math.random()*(j+1)); [p[j], p[k]]=[p[k], p[j]]; }
            return { z, p };
        });

        let finalRes = [...frozenData];
        // Handle name updates for frozen cards
        document.querySelectorAll('.zone-card.frozen').forEach((block, idx) => {
            const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim().toUpperCase());
            finalRes[idx].anglers.forEach((a, i) => a.name = names[i]);
        });

        newTeams.forEach(t => {
            let zI = [0,1,2,3]; for (let j=3; j>0; j--) { const k=Math.floor(Math.random()*(j+1)); [zI[j],zI[k]]=[zI[k],zI[j]]; }
            let tr = { tName: t.tName, anglers: [] };
            t.anglers.forEach((name, i) => {
                const z1 = zones[zI[i]], p1 = pools1[zI[i]].p.pop(), z2 = rotationMap[z1], p2 = pools2[zones.indexOf(z2)].p.pop();
                tr.anglers.push({ name, z1, p1, z2, p2 });
            });
            finalRes.push(tr);
        });

        newIndivs.forEach(a => {
            let av = pools1.map((p, idx) => idx).filter(idx => pools1[idx].p.length > 0);
            const rZ = av[Math.floor(Math.random()*av.length)];
            const z1 = zones[rZ], p1 = pools1[rZ].p.pop(), z2 = rotationMap[z1], p2 = pools2[zones.indexOf(z2)].p.pop();
            finalRes.push({ tName: "", anglers: [{ name: a.name, z1, p1, z2, p2 }] });
        });

        displayDraw(finalRes);
    }

    function displayDraw(data) {
        currentDrawData = data;
        const area = document.getElementById('resultsArea'); area.innerHTML = '';
        document.getElementById('resTitle').innerText = document.getElementById('matchTitle').value || "MATCH RESULTS";
        
        data.forEach((group, idx) => {
            const div = document.createElement('div');
            div.className = 'zone-card';
            div.style.borderTop = `4px solid ${group.anglers[0].z1 === 'RED' ? '#ef4444' : group.anglers[0].z1 === 'BLUE' ? '#3b82f6' : '#10b981'}`;
            let h = `<div class="zone-header">${group.tName || 'SOLO ANGLER'}</div>`;
            group.anglers.forEach(a => {
                h += `<div class="res-row">
                    <span class="angler-name">${a.name}</span>
                    <div class="draw-pill" style="background:${zoneGradients[a.z1]}">${a.z1}<span class="peg-num">${a.p1}</span></div>
                    ${matchDays == 2 ? `<div class="draw-pill" style="background:${zoneGradients[a.z2]}">${a.z2}<span class="peg-num">${a.p2}</span></div>` : ''}
                </div>`;
            });
            div.innerHTML = h;
            area.appendChild(div);
            setTimeout(() => div.classList.add('visible'), idx * 50);
        });

        document.getElementById('entrySection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('commandBar').style.display = 'none';
        document.getElementById('navBack').style.display = 'block';
    }

    function showCheckSheet() {
        const area = document.getElementById('checkSheetArea');
        let anglers = [];
        currentDrawData.forEach(g => g.anglers.forEach(a => anglers.push({...a, team: g.tName})));
        anglers.sort((a,b) => a.name.localeCompare(b.name));
        
        let h = `<h1 style="text-align:center;">STEWARD CHECK SHEET</h1><table class="check-sheet-table"><tr><th>ANGLER</th><th>TEAM</th><th>DRAW</th><th>FUND</th><th>PAIRS</th></tr>`;
        anglers.forEach(a => {
            h += `<tr><td>${a.name}</td><td>${a.team || '-'}</td><td>${a.z1}(${a.p1}) ${matchDays==2 ? ' / '+a.z2+'('+a.p2+')':''}</td>
            <td><div class="cb-custom" onclick="this.classList.toggle('active'); updateCash();"></div></td>
            <td><div class="cb-custom" onclick="this.classList.toggle('active'); updateCash();"></div></td></tr>`;
        });
        area.innerHTML = h + `</table>`;
        document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('checkSheetSection').style.display = 'block';
        document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('cashModule').style.display = 'flex';
        document.getElementById('actionBtnArea').style.display = 'none';
    }

    function updateCash() {
        const pFee = parseFloat(document.getElementById('prizeFee').value) || 0;
        const sFee = parseFloat(document.getElementById('pairsFee').value) || 0;
        const rows = document.querySelectorAll('.check-sheet-table tr');
        let total = 0;
        rows.forEach((row, i) => {
            if(i === 0) return;
            const fund = row.cells[3].querySelector('.cb-custom').classList.contains('active');
            const pairs = row.cells[4].querySelector('.cb-custom').classList.contains('active');
            if(fund) total += pFee;
            if(pairs) total += sFee;
        });
        document.getElementById('tkCash').innerText = '£' + total;
    }

    function handleAmend() {
        frozenData = [...currentDrawData];
        document.getElementById('entryList').innerHTML = '';
        frozenData.forEach(g => {
            if(g.tName === "") addNewItem('INDIV', g);
            else addNewItem('TEAM', g);
        });
        document.getElementById('entrySection').style.display = 'block';
        document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('cashModule').style.display = 'none';
        document.getElementById('actionBtnArea').style.display = 'block';
        document.getElementById('navBack').style.display = 'none';
        updateTicker();
    }

    function showResults() { 
        document.getElementById('checkSheetSection').style.display = 'none'; 
        document.getElementById('resultsSection').style.display = 'block'; 
        document.getElementById('commandBar').style.display = 'none'; 
    }

    function exportToCSV() {
        const title = document.getElementById('matchTitle').value || "ZONEDRAW";
        let csv = "NAME,TEAM,D1_ZONE,D1_PEG,D2_ZONE,D2_PEG\n";
        currentDrawData.forEach(g => g.anglers.forEach(a => csv += `${a.name},${g.tName},${a.z1},${a.p1},${a.z2},${a.p2}\n`));
        const blob = new Blob([csv], {type: 'text/csv'});
        const lnk = document.createElement('a'); lnk.href = URL.createObjectURL(blob); lnk.download = `${title.replace(/ /g,'_')}.csv`; lnk.click();
    }
</script>
</body>
</html>
