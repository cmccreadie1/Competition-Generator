<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZONEDRAW v9.6.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f8fafc;
            --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.6);
            --border: rgba(148, 163, 184, 0.2);
            --red-g: linear-gradient(135deg, #ef4444, #7f1d1d);
            --yellow-g: linear-gradient(135deg, #f59e0b, #78350f);
            --green-g: linear-gradient(135deg, #10b981, #064e3b);
            --blue-g: linear-gradient(135deg, #3b82f6, #1e3a8a);
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; text-transform: uppercase; line-height: 1.1; overflow-x: hidden; }
        input { text-transform: uppercase; font-weight: 900 !important; color: white; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 10px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* Navigation Header */
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 5000; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 10px 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .brand-name { font-size: 18px; font-weight: 900; letter-spacing: -1px; color: var(--accent); }
        .home-btn { background: none; border: 1px solid var(--border); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 900; }

        /* Command Hub (Tiles) */
        #hubSection { max-width: 1000px; margin: 100px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px; }
        .hub-tile { background: var(--card); border: 1px solid var(--border); padding: 40px 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .hub-tile:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 40px var(--accent-glow); }
        .hub-icon { font-size: 40px; margin-bottom: 15px; display: block; }
        .hub-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; }

        /* Layout Sections */
        #entrySection, #resultsSection, #stewardSection, #historySection { max-width: 1400px; margin: 0 auto; padding: 80px 20px 120px; display: none; }
        .control-panel { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); text-align: center; margin-bottom: 25px; }

        /* Modular Cards */
        .zone-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; backdrop-filter: blur(10px); position: relative; transition: 0.3s; }
        .zone-card.solo-card { height: fit-content; align-self: start; }
        .zone-card.selected { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .zone-header { font-size: 10px; font-weight: 900; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }

        /* Results Rows */
        .res-row { display: grid; grid-template-columns: 1fr 85px 85px; gap: 5px; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .angler-name { font-size: 14px; font-weight: 900; }
        .draw-pill { padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; color: white; text-align: center; line-height: 1; }
        .peg-num { font-size: 18px; font-weight: 900; margin-left: 5px; vertical-align: middle; }

        /* Buttons & FAB */
        .btn-action { background: var(--accent); border: none; color: white; font-weight: 900; padding: 14px 28px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 12px; box-shadow: 0 4px 0 #312e81; }
        .btn-tool { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: var(--accent); font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .fab-container { position: fixed; bottom: 100px; right: 30px; z-index: 4000; display: none; flex-direction: column; gap: 12px; }
        .fab-main { width: 60px; height: 60px; border-radius: 30px; background: var(--accent); color: white; border: none; font-size: 30px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px var(--accent-glow); }
        .fab-sub { background: #1e293b; border: 1px solid var(--accent); color: white; padding: 12px 20px; border-radius: 10px; font-size: 10px; font-weight: 900; cursor: pointer; }

        /* Financials & Tickers */
        .command-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 5000; background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 2px solid var(--accent); padding: 12px 30px; display: none; justify-content: space-between; align-items: center; }
        .check-sheet-table { width: 100%; border-collapse: collapse; }
        .check-sheet-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 800; }
        .group-label { grid-column: 1 / -1; font-size: 1.2rem; font-weight: 900; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 12px; margin: 30px 0 15px; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; color: black; }
            #resultsArea { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
            .zone-card { border: 1px solid #ddd !important; background: white !important; page-break-inside: avoid; opacity: 1 !important; transform: none !important; }
            .angler-name { color: black !important; }
        }
    </style>
</head>
<body>

<div class="fixed-header no-print">
    <div class="header-content">
        <button class="home-btn" onclick="showHub()" tabindex="-1">🏠 HOME HUB</button>
        <div class="brand-name">ZONEDRAW <span id="vTag" style="font-size:10px; opacity:0.5;">v9.6.0</span></div>
        <div style="width: 80px;"></div>
    </div>
</div>

<!-- MODULE: COMMAND HUB -->
<div id="hubSection">
    <div class="hub-tile" onclick="startNewDraw()">
        <span class="hub-icon">🎯</span>
        <span class="hub-title">NEW DRAW ENGINE</span>
    </div>
    <div class="hub-tile" onclick="showHistory()">
        <span class="hub-icon">📜</span>
        <span class="hub-title">DRAW HISTORY</span>
    </div>
    <div class="hub-tile" onclick="goToActiveSteward()">
        <span class="hub-icon">📋</span>
        <span class="hub-title">STEWARD DESK</span>
    </div>
</div>

<!-- MODULE: SETUP & AMEND -->
<div id="entrySection" class="no-print">
    <div class="control-panel" id="setupPanel">
        <label style="font-size: 10px; opacity: 0.6;">MATCH TITLE (SSOT)</label>
        <input type="text" id="matchTitle" style="width:100%; font-size:20px; text-align:center; margin-top:5px;" placeholder="ENTER COMPETITION NAME...">
        <div style="display:flex; justify-content:center; gap:25px; margin-top:20px;">
            <div>
                <label>DURATION</label>
                <div class="mode-switch">
                    <div id="dayOpt1" class="mode-opt" onclick="setDays(1)">1 DAY</div>
                    <div id="dayOpt2" class="mode-opt active" onclick="setDays(2)">2 DAYS</div>
                </div>
            </div>
            <div><label>TEAMS</label><input type="number" id="initTeams" value="0" style="width:60px;"></div>
            <div><label>SOLOS</label><input type="number" id="initIndivs" value="0" style="width:60px;"></div>
        </div>
        <button class="btn-action" style="margin-top:30px;" onclick="bulkInit()">INITIALIZE MATCH</button>
    </div>
    <div id="entryList" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; margin-top:30px;"></div>
</div>

<!-- MODULE: RESULTS -->
<div id="resultsSection">
    <div class="no-print" style="display:flex; gap:10px; justify-content:center; margin-bottom:20px; flex-wrap:wrap;">
        <button onclick="window.print()" class="btn-action" style="background:#64748b;">PRINT PDF</button>
        <button onclick="showSteward()" class="btn-action" style="background:#4f46e5;">STEWARD MODE</button>
        <button onclick="exportToCSV()" class="btn-action" style="background:#10b981;">SAVE CSV</button>
        <button onclick="handleAmend()" class="btn-action" style="background:#f59e0b;">AMEND</button>
        <button onclick="saveAndFinish()" class="btn-action" style="background:#ef4444;">SAVE & FINISH</button>
    </div>
    <h1 id="resTitle" style="text-align:center; font-size:2rem; margin-bottom:20px;"></h1>
    <div id="resultsArea" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(450px, 1fr)); gap:15px;"></div>
</div>

<!-- MODULE: STEWARD DESK -->
<div id="stewardSection"><div id="stewardArea"></div></div>

<!-- MODULE: HISTORY -->
<div id="historySection">
    <h2 style="text-align:center; letter-spacing:2px;">DRAW HISTORY</h2>
    <div id="historyGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:25px; margin-top:30px;"></div>
    <div style="text-align:center; margin-top:40px;"><button onclick="clearAllHistory()" class="btn-tool" style="color:#ef4444; border-color:#ef4444;" tabindex="-1">PURGE ALL HISTORY</button></div>
</div>

<!-- SURGICAL AMEND FAB -->
<div class="fab-container" id="amendFAB">
    <button class="fab-sub" onclick="addNewItem('TEAM')" tabindex="-1">+ TEAM</button>
    <button class="fab-sub" onclick="addNewItem('INDIV')" tabindex="-1">+ SOLO</button>
    <button class="fab-main" tabindex="-1">+</button>
</div>

<!-- PERSISTENT COMMAND BAR -->
<div id="commandBar" class="command-bar no-print">
    <div style="display:flex; gap:40px;">
        <div style="display:flex; flex-direction:column;"><span style="font-size:9px; color:var(--accent);">ANGLER STATUS</span><span id="tkAnglers" style="font-size:20px; font-weight:900;">0 / 0</span></div>
        <div id="cashModule" style="display:none; flex-direction:column;"><span style="font-size:9px; color:#10b981;">REGISTERED CASH</span><span id="tkCash" style="font-size:22px; font-weight:900; color:#10b981;">£0</span></div>
    </div>
    <div id="actionBtnArea">
        <button class="btn-tool" id="mergeBtn" style="display:none; margin-right:15px; height:45px; padding:0 20px;" onclick="mergeToTeam()" tabindex="-1">CONSTRUCT TEAM (4)</button>
        <button class="btn-action" id="mainActionBtn" onclick="initiateShuffle()" tabindex="-1">PROCESS RANDOM DRAW</button>
    </div>
</div>

<div id="shuffleOverlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.98); z-index:9000; display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="font-size:2rem; font-weight:900; letter-spacing:3px;">LOCKING PRECISION...</h2>
    <div style="width:300px; height:4px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; margin-top:20px;"><div id="pBar" style="height:100%; width:0%; background:var(--accent); transition:0.1s;"></div></div>
</div>

<script>
    const zones = ['RED', 'YELLOW', 'GREEN', 'BLUE'];
    const zoneGradients = { 'RED': 'var(--red-g)', 'YELLOW': 'var(--yellow-g)', 'GREEN': 'var(--green-g)', 'BLUE': 'var(--blue-g)' };
    const rotationMap = { 'RED': 'BLUE', 'BLUE': 'RED', 'YELLOW': 'GREEN', 'GREEN': 'YELLOW' };
    let currentDrawData = [], frozenData = [], vacantPool = [], matchDays = 2;
    let prizeFee = 10, pairsFee = 5;

    function showHub() {
        document.querySelectorAll('body > div[id$="Section"]').forEach(s => s.style.display = 'none');
        document.getElementById('hubSection').style.display = 'grid';
        document.getElementById('commandBar').style.display = 'none';
        document.getElementById('amendFAB').style.display = 'none';
    }

    function startNewDraw() {
        resetApp();
        document.getElementById('hubSection').style.display = 'none';
        document.getElementById('entrySection').style.display = 'block';
        document.getElementById('setupPanel').style.display = 'block';
    }

    function resetApp() {
        document.getElementById('matchTitle').value = '';
        document.getElementById('entryList').innerHTML = '';
        document.getElementById('initTeams').value = 0;
        document.getElementById('initIndivs').value = 0;
        frozenData = []; currentDrawData = []; vacantPool = [];
    }

    function showHistory() {
        showHub(); document.getElementById('hubSection').style.display = 'none';
        const section = document.getElementById('historySection'); section.style.display = 'block';
        const grid = document.getElementById('historyGrid'); grid.innerHTML = '';
        const vault = JSON.parse(localStorage.getItem('zonedraw_vault_v9') || '{}');
        Object.keys(vault).forEach(title => {
            const e = vault[title];
            const div = document.createElement('div'); div.className = 'hub-tile';
            div.innerHTML = `<strong style="color:var(--accent);">${title}</strong><br><small style="text-transform:none;">${e.time}</small>`;
            div.onclick = () => loadMatch(title, e);
            grid.appendChild(div);
        });
    }

    function loadMatch(title, entry) {
        document.getElementById('matchTitle').value = title;
        matchDays = entry.days; prizeFee = entry.prize || 10; pairsFee = entry.pairs || 5;
        setDays(matchDays); displayDraw(entry.data);
    }

    function goToActiveSteward() {
        const vault = JSON.parse(localStorage.getItem('zonedraw_vault_v9') || '{}');
        const keys = Object.keys(vault);
        if(keys.length === 0) return alert("NO DRAWS FOUND.");
        loadMatch(keys[0], vault[keys[0]]); showSteward();
    }

    function setDays(d) {
        matchDays = d;
        document.getElementById('dayOpt1').classList.toggle('active', d === 1);
        document.getElementById('dayOpt2').classList.toggle('active', d === 2);
    }

    function bulkInit() {
        const t = parseInt(document.getElementById('initTeams').value) || 0;
        const i = parseInt(document.getElementById('initIndivs').value) || 0;
        for(let x=0; x<t; x++) addNewItem('TEAM');
        for(let y=0; y<i; y++) addNewItem('INDIV');
        document.getElementById('commandBar').style.display = 'flex';
        updateTicker();
    }

    function addNewItem(type, data = null) {
        const list = document.getElementById('entryList');
        const div = document.createElement('div');
        div.className = 'zone-card visible' + (data ? ' frozen' : '') + (type === 'INDIV' ? ' solo-card' : '');
        div.dataset.type = type;
        
        let h = `<div class="zone-header"><span>${type}</span>`;
        h += `<div><input type="checkbox" class="merge-cb" onchange="toggleCardSelect(this)" tabindex="-1">`;
        if(type === 'TEAM' && data) {
            h += `<button class="btn-tool" onclick="breakTeam(this)" style="margin-left:5px;" tabindex="-1">🔗 UNLINK</button>`;
        } else {
            h += `<button onclick="deleteCard(this)" style="background:none; border:none; color:#ef4444; font-weight:900; cursor:pointer; margin-left:5px;" tabindex="-1">×</button>`;
        }
        h += `</div></div>`;

        if(type === 'TEAM') {
            h += `<label>TEAM</label><input type="text" class="t-name" value="${data ? data.tName : ''}" style="width:95%; margin-bottom:8px;">` + 
                 [0,1,2,3].map(n => `<input type="text" class="a-name" oninput="updateTicker()" value="${data ? data.anglers[n].name : ''}" placeholder="ANGLER ${n+1}" style="width:95%; margin-bottom:5px;">`).join('');
        } else {
            const n = data ? (data.anglers ? data.anglers[0].name : data.name) : '';
            h += `<label>ANGLER</label><input type="text" class="a-name" oninput="updateTicker()" value="${n}" style="width:95%;">`;
        }
        div.innerHTML = h; list.appendChild(div);
    }

    function toggleCardSelect(cb) {
        cb.closest('.zone-card').classList.toggle('selected', cb.checked);
        const sel = document.querySelectorAll('.merge-cb:checked').length;
        document.getElementById('mergeBtn').style.display = (sel === 4) ? 'inline-block' : 'none';
    }

    function deleteCard(btn) {
        const card = btn.closest('.zone-card');
        if(card.classList.contains('frozen')) {
            const names = Array.from(card.querySelectorAll('.a-name')).map(i => i.value.trim());
            const group = currentDrawData.find(g => g.anglers.some(a => names.includes(a.name)));
            if(group) group.anglers.forEach(a => vacantPool.push({ z1: a.z1, p1: a.p1, z2: a.z2, p2: a.p2 }));
        }
        card.remove(); updateTicker();
    }

    function mergeToTeam() {
        const sel = document.querySelectorAll('.merge-cb:checked');
        const names = [];
        sel.forEach(c => { const card = c.closest('.zone-card'); names.push(card.querySelector('.a-name').value); card.remove(); });
        addNewItem('TEAM');
        const inputs = document.querySelector('.zone-card:last-child').querySelectorAll('.a-name');
        names.forEach((n, i) => inputs[i].value = n);
        updateTicker(); document.getElementById('mergeBtn').style.display = 'none';
    }

    function breakTeam(btn) {
        const card = btn.closest('.zone-card');
        const tName = card.querySelector('.t-name').value.trim().toUpperCase();
        const g = frozenData.find(x => x.tName.trim().toUpperCase() === tName);
        if(!g) return;
        frozenData = frozenData.filter(x => x.tName.trim().toUpperCase() !== tName);
        g.anglers.forEach(a => frozenData.push({ tName: "", anglers: [a] }));
        handleAmend();
    }

    function updateTicker() {
        let ent = 0, tot = 0;
        document.querySelectorAll('.a-name').forEach(i => { tot++; if(i.value.trim()) ent++; });
        document.getElementById('tkAnglers').innerText = `${ent} / ${tot}`;
    }

    function initiateShuffle() {
        const overlay = document.getElementById('shuffleOverlay'); const pBar = document.getElementById('pBar');
        overlay.style.display = 'flex'; let p = 0;
        const inv = setInterval(() => {
            p += 5; pBar.style.width = p + '%';
            if(p >= 100) { clearInterval(inv); overlay.style.display = 'none'; runDraw(); }
        }, 30);
    }

    function runDraw() {
        let newT = [], newI = [];
        document.querySelectorAll('.zone-card:not(.frozen)').forEach(block => {
            const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim().toUpperCase()).filter(n => n);
            const tName = (block.querySelector('.t-name')?.value || "").trim().toUpperCase();
            if(block.dataset.type === 'TEAM' && names.length) newT.push({ tName, anglers: names });
            else if(names[0]) newI.push({ name: names[0] });
        });

        let occ1 = { RED:[], YELLOW:[], GREEN:[], BLUE:[] }, occ2 = { RED:[], YELLOW:[], GREEN:[], BLUE:[] };
        frozenData.forEach(g => g.anglers.forEach(a => { occ1[a.z1].push(a.p1); if(matchDays==2) occ2[a.z2].push(a.p2); }));

        const tot = (frozenData.reduce((acc,g) => acc+g.anglers.length,0)) + (newT.length*4) + newI.length;
        const base = Math.floor(tot/4), rem = tot%4;

        let pools1 = zones.map((z, i) => {
            let s = base + (i < rem ? 1 : 0), p = [];
            for(let n=1; n<=s; n++) if(!occ1[z].includes(n)) p.push(n);
            for (let j = p.length-1; j>0; j--) { const k = Math.floor(Math.random()*(j+1)); [p[j], p[k]]=[p[k], p[j]]; }
            return { z, p };
        });

        let pools2 = zones.map((z) => {
            const src = Object.keys(rotationMap).find(k => rotationMap[k] === z);
            const srcIdx = zones.indexOf(src);
            let s = base + (srcIdx < rem ? 1 : 0), p = [];
            for(let n=1; n<=s; n++) if(!occ2[z].includes(n)) p.push(n);
            for (let j = p.length-1; j>0; j--) { const k = Math.floor(Math.random()*(j+1)); [p[j], p[k]]=[p[k], p[j]]; }
            return { z, p };
        });

        let final = [...frozenData];
        document.querySelectorAll('.zone-card.frozen').forEach((b, idx) => {
            const names = Array.from(b.querySelectorAll('.a-name')).map(i => i.value.trim().toUpperCase());
            final[idx].anglers.forEach((a, i) => a.name = names[i]);
        });

        newT.forEach(t => {
            let zI = [0,1,2,3]; for (let j=3; j>0; j--) { const k=Math.floor(Math.random()*(j+1)); [zI[j],zI[k]]=[zI[k],zI[j]]; }
            let tr = { tName: t.tName, anglers: [] };
            t.anglers.forEach((name, i) => {
                let p_data = vacantPool.shift() || { z1: zones[zI[i]], p1: pools1[zI[i]].p.pop(), z2: rotationMap[zones[zI[i]]], p2: pools2[zones.indexOf(rotationMap[zones[zI[i]]])].p.pop() };
                tr.anglers.push({ name, ...p_data });
            });
            final.push(tr);
        });

        newI.forEach(a => {
            let av = pools1.map((p, idx) => idx).filter(idx => pools1[idx].p.length > 0);
            const rZ = av[Math.floor(Math.random()*av.length)];
            let p_data = vacantPool.shift() || { z1: zones[rZ], p1: pools1[rZ].p.pop(), z2: rotationMap[zones[rZ]], p2: pools2[zones.indexOf(rotationMap[zones[rZ]])].p.pop() };
            final.push({ tName: "", anglers: [{ name: a.name, ...p_data }] });
        });

        saveAndFinish(final, false); displayDraw(final);
    }

    function saveAndFinish(data = currentDrawData, close = true) {
        const title = document.getElementById('matchTitle').value || 'UNNAMED';
        const vault = JSON.parse(localStorage.getItem('zonedraw_vault_v9') || '{}');
        vault[title] = { time: new Date().toLocaleString(), data, days: matchDays, prize: prizeFee, pairs: pairsFee };
        localStorage.setItem('zonedraw_vault_v9', JSON.stringify(vault));
        if(close && confirm("ARCHIVE MATCH AND EXIT?")) showHub();
    }

    function displayDraw(data) {
        currentDrawData = data; document.querySelectorAll('body > div[id$="Section"]').forEach(s => s.style.display = 'none');
        document.getElementById('resultsSection').style.display = 'block'; const area = document.getElementById('resultsArea'); area.innerHTML = '';
        document.getElementById('resTitle').innerText = document.getElementById('matchTitle').value || "DRAW RESULTS";
        const teams = data.filter(g => g.tName !== ""), solos = data.filter(g => g.tName === "");
        if(teams.length > 0) { area.innerHTML += `<div class="group-label">TEAMS</div>`; teams.forEach(g => renderResultCard(area, g)); }
        if(solos.length > 0) { area.innerHTML += `<div class="group-label">SOLO ANGLERS</div>`; solos.forEach(g => renderResultCard(area, g)); }
    }

    function renderResultCard(container, g) {
        const div = document.createElement('div'); div.className = 'zone-card visible';
        div.style.borderTop = `3px solid ${g.anglers[0].z1 === 'RED' ? '#ef4444' : g.anglers[0].z1 === 'BLUE' ? '#3b82f6' : '#10b981'}`;
        let h = `<div class="zone-header">${g.tName || 'SOLO'}</div>`;
        g.anglers.forEach(a => { if(!a.name) return;
            h += `<div class="res-row"><span class="angler-name">${a.name}</span>
                <div class="draw-pill" style="background:${zoneGradients[a.z1]}">${a.z1}<span class="peg-num">${a.p1}</span></div>
                ${matchDays == 2 ? `<div class="draw-pill" style="background:${zoneGradients[a.z2]}">${a.z2}<span class="peg-num">${a.p2}</span></div>` : ''}</div>`;
        });
        div.innerHTML = h; container.appendChild(div);
    }

    function showSteward() {
        document.getElementById('resultsSection').style.display = 'none'; document.getElementById('stewardSection').style.display = 'block';
        const area = document.getElementById('stewardArea'); let list = []; currentDrawData.forEach(g => g.anglers.forEach(a => { if(a.name) list.push({...a, team: g.tName}); }));
        list.sort((a,b) => a.name.localeCompare(b.name));
        let h = `<div class="control-panel"><h2>STEWARD MASTER SHEET</h2><div style="display:flex; gap:15px; justify-content:center; align-items:center;">
                <label>PRIZE (£)</label><input type="number" id="sPrize" value="${prizeFee}" oninput="prizeFee=this.value;updateCash();" style="width:70px;">
                <label>PAIRS (£)</label><input type="number" id="sPairs" value="${pairsFee}" oninput="pairsFee=this.value;updateCash();" style="width:70px;">
                <button onclick="displayDraw(currentDrawData)" class="btn-action">EXIT STEWARD</button></div></div>
                <table class="check-sheet-table"><tr><th>NAME</th><th>TEAM</th><th>DRAW</th><th>FUND</th><th>PAIRS</th></tr>`;
        list.forEach(a => {
            h += `<tr><td>${a.name}</td><td>${a.team || '-'}</td><td>${a.z1}(${a.p1}) ${matchDays==2 ? '/ '+a.z2+'('+a.p2+')':''}</td>
            <td><div class="cb-custom" onclick="this.classList.toggle('active'); updateCash();"></div></td>
            <td><div class="cb-custom" onclick="this.classList.toggle('active'); updateCash();"></div></td></tr>`;
        });
        area.innerHTML = h + `</table>`; document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('cashModule').style.display = 'flex'; document.getElementById('actionBtnArea').style.display = 'none';
    }

    function updateCash() {
        let total = 0; document.querySelectorAll('.check-sheet-table tr').forEach((row, i) => {
            if(i === 0) return;
            if(row.cells[3].querySelector('.cb-custom')?.classList.contains('active')) total += parseFloat(prizeFee) || 0;
            if(row.cells[4].querySelector('.cb-custom')?.classList.contains('active')) total += parseFloat(pairsFee) || 0;
        });
        document.getElementById('tkCash').innerText = '£' + total;
    }

    function handleAmend() {
        frozenData = [...currentDrawData]; document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('entrySection').style.display = 'block'; document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('amendFAB').style.display = 'flex'; document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('entryList').innerHTML = ''; frozenData.forEach(g => { if(g.tName === "") addNewItem('INDIV', g); else addNewItem('TEAM', g); });
        updateTicker();
    }

    function exportToCSV() {
        let csv = "NAME,TEAM,DAY 1 ZONE,DAY 2 ZONE\n";
        currentDrawData.forEach(g => g.anglers.forEach(a => { if(a.name) csv += `${a.name},${g.tName || "-"},${a.z1},${matchDays==2?a.z2:"-"}\n`; }));
        const blob = new Blob([csv], {type: 'text/csv'});
        const lnk = document.createElement('a'); lnk.href = URL.createObjectURL(blob); lnk.download = `ZONEDRAW_${Date.now()}.csv`; lnk.click();
    }

    function clearAllHistory() { if(confirm("DELETE ALL?")) { localStorage.removeItem('zonedraw_vault_v9'); showHistory(); } }
</script>
</body>
</html>
