<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZONEDRAW v10.6.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f8fafc;
            --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.6);
            --border: rgba(148, 163, 184, 0.2);
            --red-g: linear-gradient(135deg, #ef4444, #7f1d1d);
            --yellow-g: linear-gradient(135deg, #f59e0b, #78350f);
            --green-g: linear-gradient(135deg, #10b981, #064e3b);
            --blue-g: linear-gradient(135deg, #3b82f6, #1e3a8a);
            --pending: #f59e0b; --pending-glow: rgba(245, 158, 11, 0.3);
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; text-transform: uppercase; line-height: 1.1; overflow-x: hidden; }
        input { text-transform: uppercase; font-weight: 900 !important; color: white; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); background: rgba(255,255,255,0.1); }

        /* Header Navigation */
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 5000; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 12px 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .brand-name { font-size: 18px; font-weight: 900; letter-spacing: -1px; color: var(--accent); }
        
        /* Jumbo Home Button */
        .home-btn { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 900; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .home-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 4px 15px var(--accent-glow); transform: translateY(-1px); }

        /* Command Hub */
        #hubSection { max-width: 1000px; margin: 120px auto 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; }
        .hub-tile { background: var(--card); border: 1px solid var(--border); padding: 50px 20px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .hub-tile:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 50px var(--accent-glow); }
        .hub-icon { font-size: 44px; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .hub-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; }

        /* Structural Layouts */
        #entrySection, #resultsSection, #stewardSection, #historySection { max-width: 1400px; margin: 0 auto; padding: 110px 20px 140px; display: none; }
        .control-panel { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--border); text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Grid Adjustments for 3-Column Layout */
        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 18px; }

        /* Duration Toggle CSS Grid Fix */
        .duration-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; width: 200px; margin: 0 auto; }
        .dt-opt { padding: 12px 0; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .dt-opt.active { background: var(--accent); color: white; box-shadow: 0 4px 10px var(--accent-glow); }

        /* Data Cards & Pending States */
        .zone-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; backdrop-filter: blur(10px); position: relative; transition: 0.3s; }
        .zone-card.solo-card { height: fit-content; align-self: start; }
        .zone-card.selected { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .zone-card.pending { border-color: var(--pending); box-shadow: 0 0 15px var(--pending-glow); }
        
        .pending-tag { position: absolute; top: -10px; right: 15px; background: var(--pending); color: #0f172a; font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); z-index: 10; letter-spacing: 1px; }
        
        .zone-header { font-size: 10px; font-weight: 900; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }

        /* Results & Steward Visuals (D1/D2 Updates) */
        .res-row { display: grid; grid-template-columns: 1fr 100px 100px; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .angler-name { font-size: 13px; font-weight: 900; letter-spacing: 0.5px; }
        .pill-wrapper { display: flex; align-items: center; justify-content: flex-end; }
        .day-badge { font-size: 8px; opacity: 0.7; font-weight: 900; background: rgba(255,255,255,0.1); padding: 3px 5px; border-radius: 4px; margin-right: 5px; }
        .draw-pill { padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; color: white; text-align: center; line-height: 1; border: 1px solid rgba(255,255,255,0.1); }
        .peg-num { font-size: 16px; font-weight: 900; margin-left: 5px; vertical-align: middle; }

        .check-sheet-table { width: 100%; border-collapse: collapse; }
        .check-sheet-table td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 800; }
        .cb-custom { width: 30px; height: 30px; border: 2px solid var(--accent); border-radius: 8px; cursor: pointer; display: inline-block; position: relative; vertical-align: middle; transition: 0.2s; }
        .cb-custom.active { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .cb-custom.active::after { content: '✓'; position: absolute; left: 6px; top: -1px; color: white; font-size: 22px; }

        /* Buttons & Actions */
        .btn-action { background: var(--accent); border: none; color: white; font-weight: 900; padding: 16px 32px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 13px; box-shadow: 0 4px 0 #312e81; }
        .btn-action:active { transform: translateY(2px); box-shadow: 0 0px 0 #312e81; }
        .btn-tool { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: var(--accent); font-size: 10px; font-weight: 900; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-tool:hover { background: var(--accent); color: white; }
        .btn-jumbo { padding: 15px 25px; font-size: 12px; background: #1e293b; border: 2px solid var(--accent); color: white; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-jumbo:hover { background: var(--accent); }

        /* Command Bar */
        .command-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 5000; background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(20px); border-top: 2px solid var(--accent); padding: 15px 35px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        
        /* Hard-Coded Buckets Divider */
        .group-label { grid-column: 1 / -1; font-size: 1.4rem; font-weight: 900; color: var(--accent); border-left: 5px solid var(--accent); padding-left: 15px; margin: 40px 0 20px; letter-spacing: 1px; }
        .entry-group-label { font-size: 1.1rem; font-weight: 900; color: var(--border); margin: 30px 0 15px; letter-spacing: 1px; text-align: left; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white !important; color: black !important; }
            .bucket-grid { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
            .zone-card { border: 1px solid #ddd !important; background: white !important; page-break-inside: avoid; opacity: 1 !important; transform: none !important; box-shadow: none !important; }
            .pending-tag { display: none !important; }
            .angler-name { color: black !important; }
            .day-badge { color: black !important; background: none !important; opacity: 1 !important; }
            .draw-pill { color: black !important; border: 1px solid #ccc; background: none !important; }
            .fixed-header { display: none; }
        }
    </style>
</head>
<body>

<div class="fixed-header no-print">
    <div class="header-content">
        <button class="home-btn" onclick="showHub()" tabindex="-1">🏠 RETURN TO HOMEPAGE</button>
        <div class="brand-name">ZONEDRAW <span id="vTag" style="font-size:10px; opacity:0.5;">v10.6.0</span></div>
        <div style="width: 180px;"></div>
    </div>
</div>

<!-- HUB -->
<div id="hubSection">
    <div class="hub-tile" onclick="startNewDraw()">
        <span class="hub-icon">🎯</span>
        <span class="hub-title">GENERATE DRAW</span>
    </div>
    <div class="hub-tile" onclick="showHistory()">
        <span class="hub-icon">📜</span>
        <span class="hub-title">DRAW HISTORY</span>
    </div>
    <div class="hub-tile" onclick="goToActiveSteward()">
        <span class="hub-icon">📋</span>
        <span class="hub-title">STEWARD DESK</span>
    </div>
</div>

<!-- ENTRY / AMEND -->
<div id="entrySection" class="no-print">
    <div class="control-panel" id="setupPanel">
        <label style="font-size: 11px; opacity: 0.6; letter-spacing: 1px;">COMPETITION IDENTITY</label>
        <input type="text" id="matchTitle" style="width:100%; font-size:22px; text-align:center; margin-top:10px;" placeholder="e.g. SCOTTISH SHORE CHAMPIONSHIP 2026">
        <div style="display:flex; justify-content:center; gap:30px; margin-top:25px; align-items:flex-end;">
            <div>
                <label style="display:block; margin-bottom:5px;">DURATION</label>
                <div class="duration-toggle">
                    <div id="dayOpt1" class="dt-opt" onclick="setDays(1)">1 DAY</div>
                    <div id="dayOpt2" class="dt-opt active" onclick="setDays(2)">2 DAYS</div>
                </div>
            </div>
            <div><label style="display:block; margin-bottom:5px;">TEAMS</label><input type="number" id="initTeams" value="0" style="width:80px; text-align:center;"></div>
            <div><label style="display:block; margin-bottom:5px;">SOLOS</label><input type="number" id="initIndivs" value="0" style="width:80px; text-align:center;"></div>
        </div>
        <button class="btn-action" style="margin-top:40px;" onclick="bulkInit()">INITIALIZE MATCH</button>
    </div>
    
    <!-- Hard-Coded Buckets for Entry/Amend -->
    <div id="entryList">
        <div id="entryTeamsContainer" style="display:none;">
            <div class="entry-group-label">TEAM CONFIGURATION</div>
            <div id="entryTeamsBucket" class="bucket-grid"></div>
        </div>
        <div id="entrySolosContainer" style="display:none;">
            <div class="entry-group-label">SOLO CONFIGURATION</div>
            <div id="entrySolosBucket" class="bucket-grid"></div>
        </div>
    </div>
</div>

<!-- RESULTS -->
<div id="resultsSection">
    <div class="no-print" style="display:flex; gap:12px; justify-content:center; margin-bottom:30px; flex-wrap:wrap;">
        <button onclick="window.print()" class="btn-action" style="background:#64748b;">PRINT PDF</button>
        <button onclick="showSteward()" class="btn-action" style="background:#4f46e5;">STEWARD MODE</button>
        <button onclick="exportToCSV()" class="btn-action" style="background:#10b981;">SAVE CSV</button>
        <button onclick="handleAmend()" class="btn-action" style="background:#f59e0b;">AMEND DRAW</button>
        <button onclick="saveAndFinish()" class="btn-action" style="background:#ef4444;">SAVE & FINISH</button>
    </div>
    <h1 id="resTitle" style="text-align:center; font-size:2.5rem; margin-bottom:30px; letter-spacing:1px;"></h1>
    
    <div id="resultsArea">
        <div id="teamsBucketContainer" style="display:none;">
            <div class="group-label">TEAM STANDINGS</div>
            <div id="teamsBucket" class="bucket-grid"></div>
        </div>
        
        <div id="solosBucketContainer" style="display:none; margin-top:40px;">
            <div class="group-label">SOLO COMPETITORS</div>
            <div id="solosBucket" class="bucket-grid"></div>
        </div>
    </div>
</div>

<!-- STEWARD DESK -->
<div id="stewardSection"><div id="stewardArea"></div></div>

<!-- HISTORY -->
<div id="historySection">
    <h2 style="text-align:center; letter-spacing:3px;">PREVIOUS DRAWS</h2>
    <div id="historyGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:30px; margin-top:40px;"></div>
    <div style="text-align:center; margin-top:60px;"><button onclick="clearAllHistory()" class="btn-tool" style="color:#ef4444; border-color:#ef4444;" tabindex="-1">PURGE DATABASE</button></div>
</div>

<!-- COMMAND BAR -->
<div id="commandBar" class="command-bar no-print">
    <div style="display:flex; gap:30px; align-items:center;">
        <div style="display:flex; flex-direction:column; margin-right:20px;"><span style="font-size:10px; color:var(--accent);">ANGLERS</span><span id="tkAnglers" style="font-size:24px; font-weight:900;">0 / 0</span></div>
        <div id="cashModule" style="display:none; flex-direction:column;"><span style="font-size:10px; color:#10b981;">LIVE CASH TOTAL</span><span id="tkCash" style="font-size:24px; font-weight:900; color:#10b981;">£0</span></div>
        <div id="amendTools" style="display:none; gap:10px;">
            <button class="btn-jumbo" onclick="addNewStateItem(true)" tabindex="-1">+ TEAM</button>
            <button class="btn-jumbo" onclick="addNewStateItem(false)" tabindex="-1">+ SOLO</button>
        </div>
    </div>
    <div id="actionBtnArea" style="display:flex; gap:10px;">
        <button class="btn-jumbo" id="mergeBtn" style="display:none; border-color:#10b981; color:#10b981;" onclick="mergeSelected()" tabindex="-1">CONSTRUCT TEAM (4)</button>
        <button class="btn-action" id="mainActionBtn" onclick="initiateShuffle()" tabindex="-1">PROCESS RANDOM DRAW</button>
    </div>
</div>

<div id="shuffleOverlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.98); z-index:9000; display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="font-size:2.5rem; font-weight:900; letter-spacing:5px;">LOCKING INTEGRITY ENGINE...</h2>
    <div style="width:350px; height:6px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; margin-top:25px;"><div id="pBar" style="height:100%; width:0%; background:var(--accent); transition:0.1s;"></div></div>
</div>

<script>
    const zones = ['RED', 'YELLOW', 'GREEN', 'BLUE'];
    const zoneGradients = { 'RED': 'var(--red-g)', 'YELLOW': 'var(--yellow-g)', 'GREEN': 'var(--green-g)', 'BLUE': 'var(--blue-g)' };
    const rotationMap = { 'RED': 'BLUE', 'BLUE': 'RED', 'YELLOW': 'GREEN', 'GREEN': 'YELLOW' };
    
    // STATE-DRIVEN ID DATABASE
    let appState = []; 
    let vacantPool = []; 
    let matchDays = 2;
    let prizeFee = 10, pairsFee = 5;

    const genId = () => 'id_' + Math.random().toString(36).substr(2, 9);

    function showHub() {
        document.querySelectorAll('body > div[id$="Section"]').forEach(s => s.style.display = 'none');
        document.getElementById('hubSection').style.display = 'grid';
        document.getElementById('commandBar').style.display = 'none';
        window.scrollTo(0,0);
    }

    function startNewDraw() {
        document.getElementById('matchTitle').value = '';
        document.getElementById('initTeams').value = 0;
        document.getElementById('initIndivs').value = 0;
        appState = []; vacantPool = [];
        
        document.getElementById('hubSection').style.display = 'none';
        document.getElementById('entrySection').style.display = 'block';
        document.getElementById('setupPanel').style.display = 'block';
        document.getElementById('amendTools').style.display = 'none';
        document.getElementById('entryTeamsContainer').style.display = 'none';
        document.getElementById('entrySolosContainer').style.display = 'none';
        document.getElementById('commandBar').style.display = 'none';
    }

    function showHistory() {
        showHub(); document.getElementById('hubSection').style.display = 'none';
        const section = document.getElementById('historySection'); section.style.display = 'block';
        const grid = document.getElementById('historyGrid'); grid.innerHTML = '';
        const vault = JSON.parse(localStorage.getItem('zonedraw_vault_v10') || '{}');
        Object.keys(vault).forEach(title => {
            const e = vault[title];
            const div = document.createElement('div'); div.className = 'hub-tile';
            div.innerHTML = `<strong style="color:var(--accent); font-size:20px;">${title}</strong><br><small style="text-transform:none; opacity:0.6; margin-top:10px; display:block;">${e.time}</small>`;
            div.onclick = () => loadMatch(title, e);
            grid.appendChild(div);
        });
    }

    function loadMatch(title, entry) {
        document.getElementById('matchTitle').value = title;
        prizeFee = entry.prize || 10; pairsFee = entry.pairs || 5;
        setDays(entry.days || 2); 
        appState = JSON.parse(JSON.stringify(entry.data)); 
        displayDraw();
    }

    function goToActiveSteward() {
        const vault = JSON.parse(localStorage.getItem('zonedraw_vault_v10') || '{}');
        const keys = Object.keys(vault);
        if(keys.length === 0) return alert("NO ACTIVE DATABASE FOUND.");
        loadMatch(keys[0], vault[keys[0]]); showSteward();
    }

    function setDays(d) {
        matchDays = d;
        document.getElementById('dayOpt1').classList.toggle('active', d === 1);
        document.getElementById('dayOpt2').classList.toggle('active', d === 2);
    }

    function bulkInit() {
        appState = [];
        const t = parseInt(document.getElementById('initTeams').value) || 0;
        const i = parseInt(document.getElementById('initIndivs').value) || 0;
        for(let x=0; x<t; x++) appState.push({ id: genId(), isTeam: true, tName: '', anglers: [{},{},{},{}] });
        for(let y=0; y<i; y++) appState.push({ id: genId(), isTeam: false, tName: '', anglers: [{}] });
        
        document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('amendTools').style.display = 'flex'; 
        document.getElementById('actionBtnArea').style.display = 'flex';
        document.getElementById('cashModule').style.display = 'none';

        renderStateToScreen();
    }

    function addNewStateItem(isTeam) {
        syncScreenToState(); 
        if(isTeam) appState.push({ id: genId(), isTeam: true, tName: '', anglers: [{},{},{},{}] });
        else appState.push({ id: genId(), isTeam: false, tName: '', anglers: [{}] });
        renderStateToScreen();
    }

    function syncScreenToState() {
        document.querySelectorAll('.zone-card').forEach(card => {
            const id = card.dataset.id;
            const entry = appState.find(e => e.id === id);
            if(!entry) return;
            if(entry.isTeam) {
                entry.tName = card.querySelector('.t-name').value.trim().toUpperCase();
                const aInputs = card.querySelectorAll('.a-name');
                for(let i=0; i<4; i++) entry.anglers[i].name = aInputs[i].value.trim().toUpperCase();
            } else {
                entry.anglers[0].name = card.querySelector('.a-name').value.trim().toUpperCase();
            }
        });
    }

    function renderStateToScreen() {
        const tb = document.getElementById('entryTeamsBucket'); tb.innerHTML = '';
        const sb = document.getElementById('entrySolosBucket'); sb.innerHTML = '';
        let hasTeams = false, hasSolos = false;
        
        appState.forEach(entry => {
            const isFrozen = entry.anglers.some(a => a.z1);
            const isPending = entry.anglers.some(a => !a.z1); // Amber Highlight Logic
            
            const div = document.createElement('div');
            div.className = 'zone-card visible' + (isFrozen && !isPending ? ' frozen' : '') + (!entry.isTeam ? ' solo-card' : '') + (isPending ? ' pending' : '');
            div.dataset.id = entry.id;
            
            let h = '';
            if(isPending) h += `<div class="pending-tag">PENDING DRAW</div>`;
            
            h += `<div class="zone-header"><span>${entry.isTeam ? 'TEAM MODULE' : 'SOLO MODULE'}</span>`;
            h += `<div style="display:flex; align-items:center;">`;
            
            if(!entry.isTeam) {
                h += `<input type="checkbox" class="merge-cb" onchange="checkMerge()" tabindex="-1" style="width:18px; height:18px; cursor:pointer; accent-color:var(--accent);">`;
            }

            if(entry.isTeam && isFrozen) {
                h += `<button class="btn-tool" onclick="breakStateTeam('${entry.id}')" style="margin-left:8px;" tabindex="-1">🔗 UNLINK</button>`;
            } else {
                h += `<button onclick="deleteStateEntry('${entry.id}')" style="background:none; border:none; color:#ef4444; font-weight:900; font-size:22px; cursor:pointer; margin-left:8px; line-height:1;" tabindex="-1">×</button>`;
            }
            h += `</div></div>`;

            if(entry.isTeam) {
                h += `<label style="font-size:10px; opacity:0.6;">TEAM NAME</label><input type="text" class="t-name" value="${entry.tName}" style="width:95%; margin-bottom:12px; font-size:14px;">`;
                for(let i=0; i<4; i++) h += `<input type="text" class="a-name" value="${entry.anglers[i].name || ''}" placeholder="ANGLER ${i+1}" style="width:95%; margin-bottom:6px; font-size:13px;">`;
            } else {
                h += `<label style="font-size:10px; opacity:0.6;">SOLO NAME</label><input type="text" class="a-name" value="${entry.anglers[0].name || ''}" style="width:95%; font-size:14px;">`;
            }
            div.innerHTML = h; 
            
            if (entry.isTeam) { tb.appendChild(div); hasTeams = true; }
            else { sb.appendChild(div); hasSolos = true; }
            
            div.querySelectorAll('.a-name').forEach(inp => inp.addEventListener('input', updateTicker));
        });
        
        document.getElementById('entryTeamsContainer').style.display = hasTeams ? 'block' : 'none';
        document.getElementById('entrySolosContainer').style.display = hasSolos ? 'block' : 'none';
        
        updateTicker();
        checkMerge();
    }

    function deleteStateEntry(id) {
        syncScreenToState();
        const idx = appState.findIndex(e => e.id === id);
        if(idx === -1) return;
        const entry = appState[idx];
        
        entry.anglers.forEach(a => {
            if(a.z1) vacantPool.push({ z1: a.z1, p1: a.p1, z2: a.z2, p2: a.p2 });
        });
        
        appState.splice(idx, 1);
        renderStateToScreen();
    }

    function breakStateTeam(id) {
        syncScreenToState();
        const idx = appState.findIndex(e => e.id === id);
        if(idx === -1) return;
        
        const team = appState.splice(idx, 1)[0];
        team.anglers.forEach(a => {
            appState.push({ id: genId(), isTeam: false, tName: '', anglers: [{...a}] });
        });
        
        renderStateToScreen();
    }

    function mergeSelected() {
        syncScreenToState();
        const sel = document.querySelectorAll('.merge-cb:checked');
        if(sel.length !== 4) return;
        const ids = Array.from(sel).map(cb => cb.closest('.zone-card').dataset.id);
        
        const newTeamAnglers = [];
        ids.forEach(id => {
            const idx = appState.findIndex(e => e.id === id);
            if(idx > -1) {
                const entry = appState.splice(idx, 1)[0]; 
                newTeamAnglers.push(entry.anglers[0]); 
            }
        });
        
        appState.push({ id: genId(), isTeam: true, tName: '', anglers: newTeamAnglers });
        renderStateToScreen();
    }

    function checkMerge() {
        const count = document.querySelectorAll('.merge-cb:checked').length;
        document.getElementById('mergeBtn').style.display = (count === 4) ? 'inline-block' : 'none';
    }

    function updateTicker() {
        let ent = 0, tot = 0;
        document.querySelectorAll('.a-name').forEach(i => { tot++; if(i.value.trim()) ent++; });
        document.getElementById('tkAnglers').innerText = `${ent} / ${tot}`;
    }

    function initiateShuffle() {
        const overlay = document.getElementById('shuffleOverlay'); const pBar = document.getElementById('pBar');
        overlay.style.display = 'flex'; let p = 0;
        const inv = setInterval(() => {
            p += 4; pBar.style.width = p + '%';
            if(p >= 100) { clearInterval(inv); overlay.style.display = 'none'; runDraw(); }
        }, 35);
    }

    function runDraw() {
        syncScreenToState(); 

        appState = appState.filter(e => {
            if (e.isTeam) return e.anglers.some(a => a.name.trim() !== '' || a.z1) || e.tName.trim() !== '';
            return e.anglers[0].name.trim() !== '' || e.anglers[0].z1;
        });

        let occ1 = { RED:[], YELLOW:[], GREEN:[], BLUE:[] }, occ2 = { RED:[], YELLOW:[], GREEN:[], BLUE:[] };
        let totalCompetitors = 0;

        appState.forEach(entry => {
            totalCompetitors += entry.isTeam ? 4 : 1;
            entry.anglers.forEach(a => {
                if (a.z1) {
                    occ1[a.z1].push(a.p1);
                    if (matchDays == 2 && a.z2) occ2[a.z2].push(a.p2);
                }
            });
        });

        const base = Math.floor(totalCompetitors / 4), rem = totalCompetitors % 4;

        let pools1 = zones.map((z, i) => {
            let s = base + (i < rem ? 1 : 0), p = [];
            for (let n = 1; n <= s; n++) if (!occ1[z].includes(n)) p.push(n);
            for (let j = p.length - 1; j > 0; j--) { const k = Math.floor(Math.random() * (j + 1)); [p[j], p[k]] = [p[k], p[j]]; }
            return { z, p };
        });

        let pools2 = zones.map((z) => {
            const src = Object.keys(rotationMap).find(k => rotationMap[k] === z);
            const srcIdx = zones.indexOf(src);
            let s = base + (srcIdx < rem ? 1 : 0), p = [];
            for (let n = 1; n <= s; n++) if (!occ2[z].includes(n)) p.push(n);
            for (let j = p.length - 1; j > 0; j--) { const k = Math.floor(Math.random() * (j + 1)); [p[j], p[k]] = [p[k], p[j]]; }
            return { z, p };
        });

        const pullRandomPeg = () => {
            if (vacantPool.length > 0) return vacantPool.shift();
            let avZ = pools1.map((p, idx) => idx).filter(idx => pools1[idx].p.length > 0);
            if (avZ.length === 0) return { z1: 'RED', p1: 99, z2: 'BLUE', p2: 99 }; 
            const rZ = avZ[Math.floor(Math.random() * avZ.length)];
            const src2 = zones.indexOf(rotationMap[zones[rZ]]);
            return { z1: zones[rZ], p1: pools1[rZ].p.pop() || 99, z2: rotationMap[zones[rZ]], p2: pools2[src2].p.pop() || 99 };
        };

        appState.forEach(entry => {
            let needsDraw = entry.anglers.filter(a => !a.z1);
            if (needsDraw.length === 0) return;

            if (entry.isTeam && needsDraw.length === 4) {
                let zIndexes = [0, 1, 2, 3]; 
                for (let j = 3; j > 0; j--) { const k = Math.floor(Math.random() * (j + 1)); [zIndexes[j], zIndexes[k]] = [zIndexes[k], zIndexes[j]]; }
                entry.anglers.forEach((a, i) => {
                    if (vacantPool.length > 0) {
                        let v = vacantPool.shift();
                        a.z1 = v.z1; a.p1 = v.p1; a.z2 = v.z2; a.p2 = v.p2;
                    } else {
                        const zi = zIndexes[i], src2 = zones.indexOf(rotationMap[zones[zi]]);
                        a.z1 = zones[zi]; a.p1 = pools1[zi].p.pop() || 99;
                        a.z2 = rotationMap[zones[zi]]; a.p2 = pools2[src2].p.pop() || 99;
                    }
                });
            } else {
                needsDraw.forEach(a => {
                    let pd = pullRandomPeg();
                    a.z1 = pd.z1; a.p1 = pd.p1; a.z2 = pd.z2; a.p2 = pd.p2;
                });
            }
        });

        saveAndFinish(false);
        displayDraw();
    }

    function saveAndFinish(close = true) {
        const title = document.getElementById('matchTitle').value || 'UNNAMED_MATCH';
        const vault = JSON.parse(localStorage.getItem('zonedraw_vault_v10') || '{}');
        vault[title] = { time: new Date().toLocaleString(), data: appState, days: matchDays, prize: prizeFee, pairs: pairsFee };
        localStorage.setItem('zonedraw_vault_v10', JSON.stringify(vault));
        if(close && confirm("ARCHIVE DATABASE AND EXIT TO HUB?")) showHub();
    }

    function displayDraw() {
        document.querySelectorAll('body > div[id$="Section"]').forEach(s => s.style.display = 'none');
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('resTitle').innerText = document.getElementById('matchTitle').value || "MATCH RESULTS";
        
        const tb = document.getElementById('teamsBucket'); tb.innerHTML = '';
        const sb = document.getElementById('solosBucket'); sb.innerHTML = '';
        
        const teams = appState.filter(e => e.isTeam);
        const solos = appState.filter(e => !e.isTeam);

        document.getElementById('teamsBucketContainer').style.display = teams.length > 0 ? 'block' : 'none';
        document.getElementById('solosBucketContainer').style.display = solos.length > 0 ? 'block' : 'none';

        teams.forEach(g => renderResultCard(tb, g));
        solos.forEach(g => renderResultCard(sb, g));
        window.scrollTo(0,0);
    }

    function renderResultCard(container, g) {
        const div = document.createElement('div'); div.className = 'zone-card visible';
        const firstZ1 = g.anglers[0] && g.anglers[0].z1 ? g.anglers[0].z1 : 'GREEN';
        div.style.borderTop = `4px solid ${firstZ1 === 'RED' ? '#ef4444' : firstZ1 === 'BLUE' ? '#3b82f6' : '#10b981'}`;
        
        let h = `<div class="zone-header" style="font-size:12px;">${g.tName || 'SOLO ANGLER'}</div>`;
        g.anglers.forEach(a => { 
            if(!a.name || !a.z1) return;
            // D1 / D2 Micro Badges Added Here
            h += `<div class="res-row"><span class="angler-name">${a.name}</span>
                <div class="pill-wrapper"><span class="day-badge">D1</span><div class="draw-pill" style="background:${zoneGradients[a.z1]}">${a.z1}<span class="peg-num">${a.p1}</span></div></div>
                ${matchDays == 2 && a.z2 ? `<div class="pill-wrapper"><span class="day-badge">D2</span><div class="draw-pill" style="background:${zoneGradients[a.z2]}">${a.z2}<span class="peg-num">${a.p2}</span></div></div>` : '<div></div>'}
                </div>`;
        });
        div.innerHTML = h; container.appendChild(div);
    }

    function showSteward() {
        document.getElementById('resultsSection').style.display = 'none'; document.getElementById('stewardSection').style.display = 'block';
        const area = document.getElementById('stewardArea'); let list = []; appState.forEach(g => g.anglers.forEach(a => { if(a.name) list.push({...a, team: g.tName}); }));
        list.sort((a,b) => a.name.localeCompare(b.name));
        let h = `<div class="control-panel"><h2>STEWARD MASTER SHEET</h2><div style="display:flex; gap:25px; justify-content:center; align-items:center; flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:10px;"><label>PRIZE (£)</label><input type="number" id="sPrize" value="${prizeFee}" oninput="prizeFee=this.value;updateCash();" style="width:75px;"></div>
                <div style="display:flex; align-items:center; gap:10px;"><label>PAIRS (£)</label><input type="number" id="sPairs" value="${pairsFee}" oninput="pairsFee=this.value;updateCash();" style="width:75px;"></div>
                <button onclick="displayDraw()" class="btn-action">BACK TO RESULTS</button></div></div>
                <table class="check-sheet-table"><tr><th>NAME</th><th>TEAM</th><th>DRAW</th><th>FUND</th><th>PAIRS</th></tr>`;
        list.forEach(a => {
            h += `<tr><td>${a.name}</td><td>${a.team || '-'}</td><td>${a.z1}(${a.p1}) ${matchDays==2 && a.z2 ? '/ '+a.z2+'('+a.p2+')':''}</td>
            <td><div class="cb-custom" onclick="this.classList.toggle('active'); updateCash();"></div></td>
            <td><div class="cb-custom" onclick="this.classList.toggle('active'); updateCash();"></div></td></tr>`;
        });
        area.innerHTML = h; document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('cashModule').style.display = 'flex'; document.getElementById('actionBtnArea').style.display = 'none';
        document.getElementById('amendTools').style.display = 'none'; window.scrollTo(0,0);
    }

    function updateCash() {
        let total = 0; document.querySelectorAll('.check-sheet-table tr').forEach((row, i) => {
            if(i === 0) return;
            if(row.cells[3].querySelector('.cb-custom')?.classList.contains('active')) total += parseFloat(prizeFee) || 0;
            if(row.cells[4].querySelector('.cb-custom')?.classList.contains('active')) total += parseFloat(pairsFee) || 0;
        });
        document.getElementById('tkCash').innerText = '£' + total;
    }

    function handleAmend() {
        document.getElementById('resultsSection').style.display = 'none'; document.getElementById('entrySection').style.display = 'block'; 
        document.getElementById('setupPanel').style.display = 'none'; document.getElementById('commandBar').style.display = 'flex';
        document.getElementById('amendTools').style.display = 'flex'; document.getElementById('actionBtnArea').style.display = 'flex';
        document.getElementById('cashModule').style.display = 'none';
        renderStateToScreen(); window.scrollTo(0,0);
    }

    function exportToCSV() {
        let csv = "NAME,TEAM,DAY 1 ZONE,DAY 2 ZONE\n";
        appState.forEach(g => g.anglers.forEach(a => { if(a.name) csv += `${a.name},${g.tName || "-"},${a.z1},${matchDays==2?a.z2:"-"}\n`; }));
        const blob = new Blob([csv], {type: 'text/csv'});
        const lnk = document.createElement('a'); lnk.href = URL.createObjectURL(blob); lnk.download = `ZONEDRAW_EXPORT_${Date.now()}.csv`; lnk.click();
    }

    function clearAllHistory() { if(confirm("PERMANENTLY ERASE ALL RECORDS?")) { localStorage.removeItem('zonedraw_vault_v10'); showHistory(); } }
</script>
